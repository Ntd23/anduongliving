<VirtualHost *:80>
    ServerName anduongliving.test
    ServerAlias *.anduongliving.test
    ProxyPreserveHost On
 AllowEncodedSlashes NoDecode 
    Alias /admin "D:/Duong/src/laragon/www/anduongliving/public"
    DocumentRoot "D:/Duong/src/laragon/www/anduongliving/public"
    <Directory "D:/Duong/src/laragon/www/anduongliving/public">
        AllowOverride All
        Require all granted
        Options -Indexes -MultiViews
    </Directory>
    
    ProxyPass        /admin  http://127.0.0.1:8000/admin
ProxyPassReverse /admin  http://127.0.0.1:8000/admin

ProxyPass /vendor http://127.0.0.1:8000/vendor
ProxyPassReverse /vendor http://127.0.0.1:8000/vendor

ProxyPass /themes http://127.0.0.1:8000/themes
ProxyPassReverse /themes http://127.0.0.1:8000/themes

ProxyPass        /api    http://127.0.0.1:8000/api
ProxyPassReverse /api    http://127.0.0.1:8000/api
    
	ProxyPass        /storage http://127.0.0.1:8000/storage
ProxyPassReverse /storage http://127.0.0.1:8000/storage

# WebSocket cho Vite HMR
RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]

   ProxyPass        / http://127.0.0.1:3000/ 
    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>
