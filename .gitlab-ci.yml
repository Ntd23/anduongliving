stages:
  - deploy

deploy_production:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash git openssh-client
    - test -n "$SSH_PRIVATE_KEY" || (echo "SSH_PRIVATE_KEY is empty" && exit 1)
    - test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST is empty" && exit 1)
    - test -n "$DEPLOY_USER" || (echo "DEPLOY_USER is empty" && exit 1)
    - test -n "$DEPLOY_PATH" || (echo "DEPLOY_PATH is empty" && exit 1)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keygen -lf ~/.ssh/id_ed25519
  script:
    - >
      ssh -i ~/.ssh/id_ed25519
      -o IdentitiesOnly=yes
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      "$DEPLOY_USER@$DEPLOY_HOST"
      "export DEPLOY_PATH='${DEPLOY_PATH}';
      export DEPLOY_BRANCH='${DEPLOY_BRANCH:-main}';
      export NITRO_APP_NAME='${NITRO_APP_NAME:-anduongliving-nuxt}';
      printf 'DEPLOY_PATH=<%s>\n' \"\$DEPLOY_PATH\";
      ls -la \"\$DEPLOY_PATH\";
      cd \"\$DEPLOY_PATH\";
      chmod +x ./deploy.sh;
      bash ./deploy.sh"
