<VirtualHost *:80>
    SuexecUserGroup #1003 #1003
    ServerName demo.anduongliving.com
    ServerAlias www.demo.anduongliving.com
    ServerAlias mail.demo.anduongliving.com
    ServerAlias webmail.demo.anduongliving.com
    ServerAlias admin.demo.anduongliving.com

    DocumentRoot /home/anduongliving/domains/demo.anduongliving.com/main_gitlab/public

    ErrorLog /var/log/virtualmin/demo.anduongliving.com_error_log
    CustomLog /var/log/virtualmin/demo.anduongliving.com_access_log combined

    ScriptAlias /cgi-bin/ /home/anduongliving/domains/demo.anduongliving.com/cgi-bin/
    ScriptAlias /awstats /home/anduongliving/domains/demo.anduongliving.com/cgi-bin/awstats.pl

    DirectoryIndex index.php index.htm index.html

    <Directory /home/anduongliving/domains/demo.anduongliving.com/main_gitlab/public>
        Options -Indexes +IncludesNOEXEC +SymLinksIfOwnerMatch
        Require all granted
        AllowOverride All Options=ExecCGI,Includes,IncludesNOEXEC,Indexes,MultiViews,SymLinksIfOwnerMatch
    </Directory>

    <Directory /home/anduongliving/domains/demo.anduongliving.com/cgi-bin>
        Require all granted
        AllowOverride All Options=ExecCGI,Includes,IncludesNOEXEC,Indexes,MultiViews,SymLinksIfOwnerMatch
    </Directory>

    ProxyPass /.well-known !
    ProxyPass /cgi-bin !
    ProxyPass /awstats !
    ProxyPreserveHost On
    AllowEncodedSlashes NoDecode
    ProxyRequests Off

    ProxyPass /api/cms http://127.0.0.1:3001/api/cms
    ProxyPassReverse /api/cms http://127.0.0.1:3001/api/cms

    ProxyPassMatch ^/(admin|storage|vendor|build|themes)(/.*)? !
    ProxyPassMatch ^/api/v1(/.*)? !
    ProxyPassMatch ^/favicon\.ico$ !
    ProxyPassMatch ^/robots\.txt$ !
    ProxyPassMatch ^/sitemap.*\.xml$ !
    ProxyPassMatch ^/index\.php(/.*)?$ !

    RewriteEngine On

    RewriteCond %{HTTP_HOST} =webmail.demo.anduongliving.com
    RewriteRule ^/(?!.well-known)(.*)$ https://demo.anduongliving.com:20000/ [R=302,L]

    RewriteCond %{HTTP_HOST} =admin.demo.anduongliving.com
    RewriteRule ^/(?!.well-known)(.*)$ https://demo.anduongliving.com:10000/ [R=302,L]

    RewriteCond %{SERVER_NAME} =mail.demo.anduongliving.com [OR]
    RewriteCond %{SERVER_NAME} =www.demo.anduongliving.com [OR]
    RewriteCond %{SERVER_NAME} =admin.demo.anduongliving.com [OR]
    RewriteCond %{SERVER_NAME} =demo.anduongliving.com [OR]
    RewriteCond %{SERVER_NAME} =webmail.demo.anduongliving.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

    RemoveHandler .php
    RemoveHandler .php8.3

    <FilesMatch \.php$>
        SetHandler proxy:unix:/run/php/17766975561216073.sock|fcgi://127.0.0.1
    </FilesMatch>

    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    RedirectMatch ^/awstats$ /awstats/

    <Files awstats.pl>
        AuthName "demo.anduongliving.com statistics"
        AuthType Basic
        AuthUserFile /home/anduongliving/domains/demo.anduongliving.com/.awstats-htpasswd
        require valid-user
    </Files>
</VirtualHost>

